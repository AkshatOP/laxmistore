<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Ground foundation -->
  <rect x="2" y="56" width="60" height="4" rx="2" fill="#C68A3A" />

  <!-- Store building main structure -->
  <rect x="8" y="22" width="48" height="34" rx="3" fill="#2F5D50" />
  
  <!-- Store window -->
  <rect x="14" y="32" width="16" height="16" rx="2" fill="#F7F4EE" />
  <line x1="22" y1="32" x2="22" y2="48" stroke="#2F5D50" stroke-width="2" />
  <line x1="14" y1="40" x2="30" y2="40" stroke="#2F5D50" stroke-width="2" />

  <!-- Store door -->
  <rect x="36" y="32" width="14" height="24" rx="2" fill="#C68A3A" />
  <circle cx="40" cy="44" r="1.5" fill="#F7F4EE" />

  <!-- Decorative roof/awning -->
  <path d="M4 14 L60 14 L56 24 L8 24 Z" fill="#C68A3A" />
  <!-- Awning stripes -->
  <path d="M11 14 L18 14 L14 24 L8 24 Z" fill="#DF9F4F" />
  <path d="M25 14 L32 14 L28 24 L22 24 Z" fill="#DF9F4F" />
  <path d="M39 14 L46 14 L42 24 L36 24 Z" fill="#DF9F4F" />
  <path d="M53 14 L60 14 L56 24 L50 24 Z" fill="#DF9F4F" />
  
  <!-- Signboard on top -->
  <rect x="14" y="4" width="36" height="9" rx="2" fill="#F7F4EE" stroke="#C68A3A" stroke-width="1.5" />
  <!-- Text 'LAXMI' in sign -->
  <text x="32" y="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="7" fill="#2F5D50" text-anchor="middle" letter-spacing="0.5">LAXMI</text>
</svg>